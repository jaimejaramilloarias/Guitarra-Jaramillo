<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Guitarra Jaramillo: herramienta visual para estudiar escalas, modos y posiciones en el diapason." />
  <title>Guitarra Jaramillo</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --ink: #161514;
      --charcoal: #24201d;
      --paper: #fbf7f0;
      --cream: #f1e6d2;
      --gold: #d4a84f;
      --moss: #476357;
      --line: rgba(255, 255, 255, 0.14);
      --text: #fffaf0;
      --muted: rgba(255, 250, 240, 0.68);
      --grid: rgba(243, 224, 187, 0.78);
      --string: rgba(255, 247, 226, 0.92);
      --board1: #724116;
      --board2: #3b1f0b;
      --board3: #1f1007;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background:
        linear-gradient(120deg, rgba(22, 21, 20, 0.9), rgba(22, 21, 20, 0.62)),
        url("https://images.unsplash.com/photo-1510915361894-db8b60106cb1?auto=format&fit=crop&w=1800&q=80") center / cover fixed;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      align-items: center;
      background: rgba(22, 21, 20, 0.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      min-height: 76px;
      padding: 16px clamp(18px, 4vw, 56px);
    }

    .brand {
      align-items: center;
      display: flex;
      gap: 12px;
      font-weight: 900;
    }

    .brand-mark {
      align-items: center;
      background: var(--gold);
      border-radius: 50%;
      color: var(--ink);
      display: inline-flex;
      font-size: 0.82rem;
      height: 38px;
      justify-content: center;
      width: 38px;
    }

    .lab-link {
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.9rem;
      font-weight: 900;
      padding: 10px 16px;
    }

    .app-shell {
      margin: 0 auto;
      max-width: 1240px;
      padding: clamp(28px, 5vw, 62px) clamp(18px, 4vw, 56px) 60px;
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
      max-width: 820px;
    }

    .eyebrow {
      color: #9ab8aa;
      font-size: 0.78rem;
      font-weight: 1000;
      letter-spacing: 0.16em;
      margin: 0;
      text-transform: uppercase;
    }

    h1 {
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 7vw, 6.5rem);
      letter-spacing: 0;
      line-height: 0.88;
      margin: 0;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
      margin: 8px 0 0;
    }

    .panel {
      align-items: end;
      background: rgba(255, 250, 240, 0.09);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      margin-bottom: 20px;
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: rgba(255, 250, 240, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    select,
    button {
      background: rgba(22, 21, 20, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
      min-height: 42px;
      padding: 0.45rem 0.75rem;
    }

    button {
      background: var(--gold);
      border-color: transparent;
      color: var(--ink);
      font-weight: 1000;
      min-width: 42px;
      user-select: none;
    }

    button:active {
      transform: scale(0.96);
    }

    .btnBox {
      align-items: center;
      background: rgba(22, 21, 20, 0.64);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      min-height: 42px;
      overflow: hidden;
    }

    #fretVal {
      color: var(--text);
      font-weight: 900;
      text-align: center;
    }

    .board-wrap {
      background: rgba(255, 250, 240, 0.08);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
      overflow-x: auto;
      padding: 18px;
    }

    #board {
      background: transparent;
      border-radius: 14px;
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.28),
        inset 0 0 18px rgba(0, 0, 0, 0.5);
      display: block;
      max-width: none;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .legend-item {
      align-items: center;
      background: rgba(255, 250, 240, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: rgba(255, 250, 240, 0.78);
      display: flex;
      font-size: 0.9rem;
      font-weight: 800;
      gap: 8px;
      padding: 8px 12px;
    }

    .dot {
      border-radius: 50%;
      height: 16px;
      width: 16px;
    }

    .g { background: #79c267; }
    .b { background: #4e86d9; }
    .o { background: #e0a542; }
    .r { background: #e4654c; }

    #fretLabel {
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2.3rem;
      font-weight: 900;
      margin-top: 14px;
      user-select: none;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://jaramillomusiclab.com/">
      <span class="brand-mark">JML</span>
      <span>Jaramillo Music Lab</span>
    </a>
    <a class="lab-link" href="https://jaramillomusiclab.com/lab.html">Volver al Lab</a>
  </header>

  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Aplicación musical</p>
      <h1>Guitarra Jaramillo</h1>
      <p>Explora escalas, modos y posiciones sobre el diapasón con una lectura visual clara de función y disponibilidad.</p>
    </section>

    <section class="panel" aria-label="Controles de guitarra">
      <div class="field">
        <label for="root">Fundamental</label>
        <select id="root"></select>
      </div>
      <div class="field">
        <label for="scale">Escala / Modo</label>
        <select id="scale"></select>
      </div>
      <div class="field">
        <label for="pos">Posición</label>
        <select id="pos"></select>
      </div>
      <div class="field">
        <label>Trastes</label>
        <div class="btnBox"><button id="minus">−</button><span id="fretVal">16</span><button id="plus">＋</button></div>
      </div>
    </section>

    <section class="board-wrap" aria-label="Diapason de guitarra">
      <canvas id="board"></canvas>
      <div id="fretLabel">I</div>
      <div class="legend">
        <div class="legend-item"><span class="dot g"></span>Fundamental</div>
        <div class="legend-item"><span class="dot b"></span>Sonido estructural</div>
        <div class="legend-item"><span class="dot o"></span>Tensión disponible</div>
        <div class="legend-item"><span class="dot r"></span>No disponible</div>
      </div>
    </section>
  </main>
<script>
/***************** Constantes *************************/
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"],
      STR_PITCH=[64,59,55,50,45,40], // E2‑E4 6→1
      STRINGS=6, BOARD_H=160,TOTAL_FRETS=22;
let   RAD=14,visibleFrets=16;
const SCALE={
  mayor:[2,2,1,2,2,2,1],mayor_armonica:[2,2,1,2,1,3,1],menor_melodica:[2,1,2,2,2,2,1],menor_armonica:[2,1,2,2,1,3,1],
  jonico:[2,2,1,2,2,2,1],dorico:[2,1,2,2,2,1,2],frigio:[1,2,2,2,1,2,2],lidio:[2,2,2,1,2,2,1],mixolidio:[2,2,1,2,2,1,2],eolico:[2,1,2,2,1,2,2],locrio:[1,2,2,1,2,2,2],
  jonico_b6:[2,2,1,2,1,3,1],locrio_s2s6:[2,1,2,1,3,1,2],mixolidio_b2_s2_no4:[1,2,1,3,1,2,2],dorico_s4_s7:[2,1,3,1,2,2,1],mixolidio_b2:[1,3,1,2,2,1,2],lidio_s2_s5:[3,1,2,2,1,2,1],
  locrio_b7:[1,2,2,1,2,1,3],eolico_s7:[2,1,2,2,1,3,1],locrio_s6:[1,2,2,1,3,1,2],jonico_aumentado:[2,2,1,3,1,2,1],dorico_s4:[2,1,3,1,2,1,2],mixolidio_b2b6:[1,3,1,2,1,2,2],lidio_s2:[3,1,2,1,2,2,1],locrio_b4b7:[1,2,1,2,2,1,3],dorico_s7:[2,1,2,2,2,2,1],dorico_b2:[1,2,2,2,2,1,2],lidio_aumentado:[2,2,2,2,1,2,1],lidio_dominante:[2,2,2,1,2,1,2],mixolidio_b6:[2,2,1,2,1,2,2],locrio_s2:[2,1,2,1,2,2,2],alterado:[1,2,1,2,2,2,2],
  pentatonica_mayor:[2,2,3,2,3],pentatonica_dominante:[2,2,3,3,2],blues:[3,2,1,1,3,2],por_tonos:[2,2,2,2,2,2],
  disminuida_HW:[1,2,1,2,1,2,1,2],disminuida_WH:[2,1,2,1,2,1,2,1]
};
const SPECIAL=["pentatonica_mayor","blues","por_tonos"];
/***************** Utilidades *************************/
const roman=n=>({1:"I",2:"II",3:"III",4:"IV",5:"V",6:"VI",7:"VII",8:"VIII",9:"IX",10:"X",11:"XI",12:"XII",13:"XIII",14:"XIV",15:"XV",16:"XVI",17:"XVII",18:"XVIII",19:"XIX",20:"XX",21:"XXI",22:"XXII"}[n]||n),
      fretW=()=>BOARD_H/STRINGS*2.55,
      pcPattern=(root,intv)=>{const a=[root];for(let i=0;a.length<12;i++)a.push((a.at(-1)+intv[i%intv.length])%12);return a},
      pick=(pc,r,pcs,s)=>s?(pc===r?"#0f0":pcs.indexOf(pc)%3===0?"#08f":"#f80"):pc===r?"#0f0":[2,4,6].includes(pcs.indexOf(pc))?"#08f":[1,3,5].includes(pcs.indexOf(pc))?(pcs.includes((pc+11)%12)?"#f00":"#f80"):'#aaa';
/***************** DOM refs *************************/
const $=id=>document.getElementById(id),rootSel=$("root"),scaleSel=$("scale"),posSel=$("pos"),minus=$("minus"),plus=$("plus"),fretVal=$("fretVal"),fretLabel=$("fretLabel"),cvs=$("board"),ctx=cvs.getContext("2d");
NOTE.forEach(n=>rootSel.add(new Option(n,n)));
Object.keys(SCALE).forEach(k=>scaleSel.add(new Option(k.replace(/_/g,' '),k)));
/***************** Estado *************************/
let offset=0;
/***************** Helpers canvas *************************/
function fitCanvas(){const w=visibleFrets*fretW(),dpr=window.devicePixelRatio||1;cvs.style.width=`${w}px`;cvs.style.height=`${BOARD_H}px`;cvs.width=w*dpr;cvs.height=BOARD_H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
function buildPositions(){posSel.length=0;const rootPc=NOTE.indexOf(rootSel.value),ints=SCALE[scaleSel.value],pcs=pcPattern(rootPc,ints),rootsOn6=[];for(let f = 1; f <= 12; f++){const pc=(STR_PITCH[0]+f)%12;if(pcs.includes(pc))rootsOn6.push(f);}rootsOn6.forEach(f=>posSel.add(new Option(roman(f),f)));}
function roundedRectPath(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function draw(){
fitCanvas();
const fw=fretW(),width=visibleFrets*fw,padY=22,boardH=BOARD_H-(padY*2),radius=14,stringGap=boardH/(STRINGS-1);
ctx.clearRect(0,0,width,BOARD_H);

roundedRectPath(0.5,padY,width-1,boardH,radius);
ctx.save();
ctx.clip();

const bg=ctx.createLinearGradient(0,padY,0,padY+boardH);
bg.addColorStop(0,getComputedStyle(document.documentElement).getPropertyValue('--board1').trim());
bg.addColorStop(0.52,getComputedStyle(document.documentElement).getPropertyValue('--board2').trim());
bg.addColorStop(1,getComputedStyle(document.documentElement).getPropertyValue('--board3').trim());
ctx.fillStyle=bg;
ctx.fillRect(0,padY,width,boardH);

ctx.globalAlpha=0.22;
for(let i=0;i<22;i++){
  const y=padY+8+(i*11)%boardH;
  ctx.strokeStyle=i%2?'#9d6732':'#2b1508';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(0,y);
  ctx.bezierCurveTo(width*0.25,y+8,width*0.65,y-7,width,y+3);
  ctx.stroke();
}
ctx.globalAlpha=1;

ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--grid');
ctx.lineCap='butt';
for(let f=0;f<=visibleFrets;f++){
  const x=f*fw;
  ctx.lineWidth=f===0?5:2.4;
  ctx.beginPath();
  ctx.moveTo(x,padY);
  ctx.lineTo(x,padY+boardH);
  ctx.stroke();
}

ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--string');
for(let s=0;s<STRINGS;s++){
  const y=padY+(s*stringGap);
  ctx.lineWidth=1.4+(s*0.28);
  ctx.beginPath();
  ctx.moveTo(0,y);
  ctx.lineTo(width,y);
  ctx.stroke();
}

ctx.restore();

roundedRectPath(0.5,padY,width-1,boardH,radius);
ctx.strokeStyle='rgba(243,224,187,0.78)';
ctx.lineWidth=1.5;
ctx.stroke();

const rootPc=NOTE.indexOf(rootSel.value),ints=SCALE[scaleSel.value],pcs=pcPattern(rootPc,ints),spec=SPECIAL.includes(scaleSel.value);
ctx.font=`900 ${RAD*.9}px Inter, sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
for(let s=0;s<STRINGS;s++){
  for(let f=0;f<visibleFrets;f++){
    const realF=f+offset+1,pc=(STR_PITCH[s]+realF)%12;
    if(!pcs.includes(pc))continue;
    const x=f*fw+fw/2,y=padY+(s*stringGap);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.42)';
    ctx.shadowBlur=8;
    ctx.shadowOffsetY=3;
    ctx.fillStyle=pick(pc,rootPc,pcs,spec);
    ctx.beginPath();
    ctx.arc(x,y,RAD,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle="#161514";
    ctx.fillText(NOTE[pc],x,y+0.5);
  }
}
fretLabel.textContent=roman(offset+1);}
function refresh(){buildPositions();fretVal.textContent=visibleFrets;if(!posSel.value)posSel.selectedIndex=0;offset=parseInt(posSel.value||1)-1;draw();}
/***************** Listeners *************************/
minus.onclick=()=>{if(visibleFrets>4){visibleFrets--;refresh();}};
plus.onclick=()=>{if(visibleFrets<16){visibleFrets++;refresh();}};
posSel.onchange=()=>{offset=parseInt(posSel.value)-1;draw();};
rootSel.onchange=refresh;scaleSel.onchange=refresh;
window.addEventListener('load',refresh);
</script>
</body>
</html>
